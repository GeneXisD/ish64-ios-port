name: ish64 CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          brew update
          brew install meson ninja

      - name: Show tool versions
        run: |
          python3 --version
          meson --version
          ninja --version
          xcodebuild -version

      - name: Ensure scripts are executable
        run: |
          chmod +x scripts/*.sh || true
          chmod +x scripts/*.py || true

      - name: Initialize submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Patch libarchive project if script exists
        run: |
          if [ -f scripts/patch-libarchive-pbx.py ]; then
            python3 scripts/patch-libarchive-pbx.py || true
          fi

      - name: Validate Xcode project references if script exists
        run: |
          if [ -f scripts/check-pbx-missing-files.py ]; then
            python3 scripts/check-pbx-missing-files.py
          fi

      - name: Clean derived data
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData/* || true

      - name: Build ish64
        run: |
          xcodebuild \
            -project iSH.xcodeproj \
            -scheme iSH \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ish64-ci-logs
          path: |
            ~/Library/Developer/Xcode/DerivedData
