name: ish64 CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: [self-hosted, macOS]

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Show environment
        run: |
          uname -a
          xcodebuild -version

      - name: Clean derived data
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData/* || true
- name: Install dependencies
  run: |
    brew install meson ninja python || true

      - name: Build iSH64
        run: |
          xcodebuild \
            -project iSH.xcodeproj \
            -scheme iSH \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGNING_ALLOWED=NO \
            clean build | tee xcodebuild.log

      - name: Collect build products
        if: always()
        run: |
          mkdir -p ci-artifacts
          find ~/Library/Developer/Xcode/DerivedData -type f -name "*.app" -exec cp -R {} ci-artifacts/ \; || true
          cp xcodebuild.log ci-artifacts/ || true

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ish64-build-artifacts
          path: ci-artifacts
