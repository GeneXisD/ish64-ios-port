name: ish64 Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release-build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          brew update
          brew install meson ninja

      - name: Ensure scripts are executable
        run: |
          chmod +x scripts/*.sh || true
          chmod +x scripts/*.py || true

      - name: Initialize submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Repair Xcode dependency references
        run: |
          if [ -f scripts/patch-libarchive-pbx.py ]; then
            python3 scripts/patch-libarchive-pbx.py || true
          fi
          if [ -f scripts/check-pbx-missing-files.py ]; then
            python3 scripts/check-pbx-missing-files.py
          fi

      - name: Clean derived data
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData/* || true

      - name: Build ish64
        run: |
          xcodebuild \
            -project iSH.xcodeproj \
            -scheme iSH \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build \
            clean build | tee xcodebuild.log

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          find build -type d -name "*.app" -exec cp -R {} release-artifacts/ \; || true
          cp xcodebuild.log release-artifacts/ || true

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ish64-release-artifacts
          path: release-artifacts

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**
          generate_release_notes: true
